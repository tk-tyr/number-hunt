<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ナンバーハント</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- タイトル -->
  <div id="screen-title" class="screen active">
    <div class="title-inner">
      <div class="logo">🔢</div>
      <h1>ナンバーハント</h1>
      <p class="desc">答えが1〜Nになる式を<br>順番にタップ！</p>

      <div class="section-label">グリッドサイズ</div>
      <div class="size-btns" id="size-btns">
        <button class="sel-btn" data-size="3" onclick="selectSize(3)">3×3</button>
        <button class="sel-btn" data-size="4" onclick="selectSize(4)">4×4</button>
        <button class="sel-btn selected" data-size="5" onclick="selectSize(5)">5×5</button>
      </div>

      <div class="section-label">難易度</div>
      <div class="mode-btns" id="mode-btns">
        <button class="sel-btn selected" data-mode="simple" onclick="selectMode('simple')">シンプル</button>
        <button class="sel-btn" data-mode="hard" onclick="selectMode('hard')">ハード</button>
        <button class="sel-btn" data-mode="vhard" onclick="selectMode('vhard')">ベリーハード</button>
        <button class="sel-btn" data-mode="hell" onclick="selectMode('hell')">ヘル</button>
      </div>

      <div id="mode-desc"></div>
      <div id="best-display"></div>
      <button class="btn-primary" onclick="startGame()">スタート</button>
    </div>
  </div>

  <!-- ゲーム -->
  <div id="screen-game" class="screen">
    <div id="header">
      <div id="timer-wrap">
        <div id="timer">0.00</div>
        <div id="timer-unit">秒</div>
      </div>
      <div id="next-wrap">
        <div id="next-label">NEXT</div>
        <div id="next-display">1</div>
      </div>
    </div>
    <div id="math-note"></div>
    <div id="penalty-info"></div>
    <div id="penalty-flash"></div>
    <div id="grid"></div>
    <button class="btn-quit" onclick="showTitle()">やめる</button>
  </div>

  <!-- リザルト -->
  <div id="screen-result" class="screen">
    <div class="result-inner">
      <h2>クリア！</h2>
      <div id="result-combo"></div>
      <div id="result-time-wrap">
        <div id="result-time">0.00</div>
        <div id="result-unit">秒</div>
      </div>
      <div id="result-rank"></div>
      <div id="result-rank-guide"></div>
      <div id="result-penalty"></div>
      <div id="result-best"></div>
      <div class="result-btns">
        <button class="btn-share" onclick="shareScore()">📋 シェア</button>
        <button class="btn-retry" onclick="startGame()">もう一度</button>
      </div>
      <button class="btn-back" onclick="showTitle()">タイトルへ</button>
    </div>
  </div>

</div>
<script src="modes.js"></script>
<script src="game.js"></script>
</body>
</html>
